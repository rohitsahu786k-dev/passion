<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Girls of Passion Logo">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E08C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="20" cy="20" r="20" fill="url(#bgGrad)"/>

  <!-- Thin gold ring -->
  <circle cx="20" cy="20" r="18.5" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.7"/>

  <!-- Heart shape using path (elegant, minimal) -->
  <path
    d="M20 28.5 C20 28.5 10 21 10 15.5 C10 12.4 12.4 10 15.5 10 C17.4 10 19.1 11 20 12.5 C20.9 11 22.6 10 24.5 10 C27.6 10 30 12.4 30 15.5 C30 21 20 28.5 20 28.5Z"
    fill="url(#goldGrad)"
    opacity="0.9"
  />

  <!-- GP monogram overlay inside heart - subtle -->
  <text
    x="20"
    y="21"
    font-family="Georgia, serif"
    font-size="8"
    font-weight="bold"
    fill="#050505"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5"
    opacity="0.85"
  >GOP</text>
</svg>
