interface:
  display_name: seo image gen
  short_description: 'AI image generation for SEO assets: OG/social preview images,
    blog hero images, schema images, product photography, infographics. Powered by
    Gemini via nanobanana-mcp. Requires banana extension installed. Use when user
    says \"generate image\", \"OG image\", \"social preview\", \"hero image\", \"blog
    image\", \"product photo\", \"infographic\", \"seo image\", \"create visual\",
    \"image-gen\", \"favicon\", \"schema image\", \"pinterest pin\", \"generate visual\",
    \"banner\", or \"thumbnail\".'
  icon_small: assets/icon.svg
  icon_large: assets/icon.svg
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
